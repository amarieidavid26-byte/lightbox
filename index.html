<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id ="app">

    <div id="toolbar">

        <div class="tool-section">
            <button class="tool-btn active" data-tool="select" title="Select / Move">
                <svg viewBox="0 0 20 20">
                    <path d="M4 2 L4 15 L7.5 12 L10 17 L12 16 L9.5 11 L14 11 Z"/>
                </svg>
            </button>
        </div>

        <div class="tool-section">
            <button class="tool-btn" data-tool="point-source" title="Point Source">
                <svg viewBox="0 0 20 20">
                    <circle cx="10" cy="10" r="3"/>
                    <line x1="10" y1="2" x2="10" y2="5"/>
                    <line x1="10" y1="15" x2="10" y2="18"/>
                    <line x1="2" y1="10" x2="5" y2="10"/>
                    <line x1="15" y1="10" x2="18" y2="10"/>
                    <line x1="4.2" y1="4.2" x2="6.3" y2="6.3"/>
                    <line x1="13.7" y1="13.7" x2="15.8" y2="15.8"/>
                    <line x1="15.8" y1="4.2" x2="13.7" y2="6.3"/>
                    <line x1="4.2" y1="15.8" x2="6.3" y2="13.7"/>
                </svg>
            </button>
            <button class="tool-btn" data-tool="laser-beam" title="Laser Beam">
                <svg viewBox="0 0 20 20">
                    <rect x="2" y="8" width="10" height="4" rx="2"/>
                    <line x1="12" y1="10" x2="18" y2="10"/>
                    <polyline points="15,7 18,10 15,13"/>
                </svg>
            </button>
        </div>

        <div class="tool-section">
            <button class="tool-btn" data-tool="flat-mirror" title="Flat Mirror">
                <svg viewBox="0 0 20 20">
                    <line x1="4" y1="10" x2="16" y2="10"/>
                    <line x1="4" y1="10" x2="5" y2="13"/>
                    <line x1="7" y1="10" x2="8" y2="13"/>
                    <line x1="10" y1="10" x1="11" y2="13"/>
                    <line x1="13" y1="10" x1="14" y2="13"/>
                    <line x1="16" y1="10" x2="17" y2="13"/>
                </svg>
            </button>
            <button class="tool-btn" data-tool="curved-mirror" title="Curved Mirror">
                <svg viewBox="0 0 20 20">
                    <path d="M 6 3 Q 14 10 6 17" fill="none"/>
                    <path d="M 6 3 Q 5 6 5.5 10" fill="none" stroke-dasharray="2,2" opacity="0.4"/>
                    <path d="M 5.5 10 Q 5 14 6 17" fill="none" stroke-dasharray="2,2" opacity="0.4"/>
                </svg>
            </button>
            <button class="tool-btn" data-tool="lens" title="Lens">
                <svg viewBox="0 0 20 20">
                    <path d="M 10 3 Q 15 10 10 17 Q 5 10 10 3 Z"/>
                </svg>
            </button>
            <button class="tool-btn" data-tool="prism" title="Prism">
                <svg viewBox="0 0 20 20">
                    <polygon points="10,3 17,16 3,16"/>
                </svg>
            </button>
        </div>

        <div class="tool-section">
            <button class="tool-btn" id="btn-delete" data-tool="delete-selected" title="Delete">
                <svg viewBox="0 0 20 20">
                    <polyline points="5,5 15,15"/>
                    <polyline points="15,5 5,15"/>
                </svg>
            </button>
            <button class="tool-btn" id="btn-grid" title="Toggle Grid">
                <svg viewBox="0 0 20 20">
                    <circle cx="5" cy="5" r="1" fill="currentColor" stroke="none"/>
                    <circle cx="10" cy="5" r="1" fill="currentColor" stroke="none"/>
                    <circle cx="15" cy="5" r="1" fill="currentColor" stroke="none"/>
                    <circle cx="15" cy="10" r="1" fill="currentColor" stroke="none"/>
                    <circle cx="10" cy="10" r="1" fill="currentColor" stroke="none"/>
                    <circle cx="15" cy="10" r="1" fill="currentColor" stroke="none"/>
                    <circle cx="5" cy="15" r="1" fill="currentColor" stroke="none"/>
                    <circle cx="10" cy="15" r="1" fill="currentColor" stroke="none"/>
                    <circle cx="15" cy="15" r="1" fill="currentColor" stroke="none"/>
                </svg>
            </button>
            <button class="tool-btn" id="btn-clear" title="Clear All">
                <svg viewbox="0 0 20 20">
                    <polyline points="5,6 5,17 15,17 15,6"/>
                    <line x1="3" y1="6" x2="17" y2="6"/>
                    <line x1="8" y1="6" x2="8" y2="3"/>
                    <line x1="12" y1="6" x2="12" y2="3"/>
                    <line x1="8" y1="3" x2="12" y2="3"/>
                </svg>
            </button>
        </div>
        
        <div class="tool-section">
            <button class="tool-btn" id="btn-preset-rainbow" title="Prism Rainbow">
                <svg viewBox="0 0 20 20">
                    <path d="M 3 14 Q 3 6 10 6 Q 17 6 17 14" fill="none"/>
                    <path d="M 5 14 Q 5 8 10 8 Q 15 8 15 14" fill="none" opacity="0.6"/>
                </svg>
            </button>
            <button class="tool-btn" id="btn-preset-tunnel" title="Mirror Tunnel">
                <svg viewbox="0 0 20 20">
                    <line x1="3" y1="6" x2="17" y2="6"/>
                    <line x1="3" y1="14" x2="17" y2="14"/>
                    <line x1="5" y1="10" x2="15" y2="10" stroke-dasharray="3,2"/>
                </svg>
            </button>
            <button class="tool-btn" id="btn-preset-lens" title="Lens Focus">
                <svg viewBox="0 0 20 20">
                    <path d="M 10 3 Q 15 10 10 17 Q 5 10 10 3 Z"/>
                    <line x1="2" y1="7" x2="7" y2="10"/>
                    <line x1="2" y1="10" x2="7" y2="10"/>
                    <line x1="2" y1="13" x2="7" y2="10"/>
                    <line x1="13" y1="10" x2="18" y2="10"/>
                </svg>
            </button>
            <button class="tool-btn" id="btn-preset-darkside" title="Dark Side">
                <svg viewBox="0 0 20 20">
                    <polygon points="10,3 17,16 3,16"/>
                    <line x1="3" y1="10" x2="7.5" y2="10" stroke-width="1.5"/>
                    <line x1="13" y1="8" x2="17" y2="6" stroke="#ff4466" stroke-width="1.3"/>
                    <line x1="13.5" y1="10" x2="17.5" y2="10" stroke="#ffcc00" stroke-width="1.3"/>
                    <line x1="13" y1="12" x2="17" y2="14" stroke="#44aaff" stroke-width="1.3"/>
                </svg>
            </button>
        </div>

    </div>

    <div id="canvas-area">
        <canvas id="canvas"></canvas>
        <div id="properties-panel"></div>
        <div id="help-hint">click to place ○ drag to move ○ del to remove</div>
    </div>

</div>

<script src="js/physics.js"></script>
<script src="js/render.js"></script>
<script src="js/app.js"></script>
</body>
</html>
